services:
  painfree:
    image: ghcr.io/tionkje/painfree:latest
    container_name: painfree
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/painfree.db
      # Required behind Caddy for CSRF-protected form actions (adapter-node).
      - ORIGIN=https://painfree.omv.deknudtcallens.be
    volumes:
      - painfree-data:/app/data
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  painfree-data:
    name: painfree-data
